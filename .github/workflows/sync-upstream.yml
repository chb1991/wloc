name: Sync upstream

on:
  schedule:
    # 20:17 UTC = 04:17 China Standard Time (next day)
    - cron: "17 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Merge upstream into default branch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Sync fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          status="$(
            curl --silent --show-error \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --request POST \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/merge-upstream" \
              --data "{\"branch\":\"${BRANCH}\"}"
          )"

          cat "$response_file"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Upstream sync failed with HTTP status $status" >&2
            exit 1
          fi